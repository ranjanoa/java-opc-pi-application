name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "OPC_UA_PI_Influx_Gateway" `
            --icon NONE `
            --collect-all asyncua `
            --collect-all asyncua.crypto `
            "dataingestionfinal v3.py"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: OPC_UA_PI_Influx_Gateway
          path: dist/OPC_UA_PI_Influx_Gateway.exe
          retention-days: 30
